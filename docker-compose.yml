services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tripe_logs
      POSTGRES_USER: tripe_logs
      POSTGRES_PASSWORD: tripe_logs
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tripe_logs -d tripe_logs"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: tripe_logs
      POSTGRES_USER: tripe_logs
      POSTGRES_PASSWORD: tripe_logs
      DEBUG: "true"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/api/health/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5174:5173"
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:8001
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
